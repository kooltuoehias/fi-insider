name: Daily Scraper

on:
  schedule:
    # 15:45 UTC = 17:45 CEST (summer) / 16:45 CET (winter)
    # Runs after Swedish market close (17:30 local) to allow FI data propagation
    - cron: '45 15 * * *' # Every day
  workflow_dispatch: # Manual trigger button in GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: scraper
        run: npm ci

      - name: Merge year files → transactions.json
        working-directory: scraper
        run: node merge.js

      - name: Run scraper (incremental)
        working-directory: scraper
        run: node index.js

      - name: Split transactions.json → per-year files
        working-directory: scraper
        run: node split.js

      - name: Push metrics to Grafana Cloud
        working-directory: scraper
        continue-on-error: true
        env:
          GRAFANA_REMOTE_WRITE_URL: ${{ secrets.GRAFANA_REMOTE_WRITE_URL }}
          GRAFANA_METRICS_USER: ${{ secrets.GRAFANA_METRICS_USER }}
          GRAFANA_METRICS_PASSWORD: ${{ secrets.GRAFANA_METRICS_PASSWORD }}
        run: node push-metrics.js

      - name: Commit Updated Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: daily scraper sync"
          file_pattern: >-
            frontend/public/data/transactions_*.json
            scraper/scraper_state.json
