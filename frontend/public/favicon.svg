<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006aa7" />
      <stop offset="100%" stop-color="#004a77" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.3" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  
  <g filter="url(#shadow)">
    <!-- Chart Bars -->
    <rect x="120" y="280" width="64" height="120" rx="16" fill="#fecc02" />
    <rect x="224" y="160" width="64" height="240" rx="16" fill="#fecc02" />
    <rect x="328" y="230" width="64" height="170" rx="16" fill="#fecc02" />
    
    <!-- Magnifying Glass -->
    <circle cx="256" cy="180" r="72" fill="none" stroke="#ffffff" stroke-width="32" />
    <line x1="306" y1="230" x2="380" y2="304" stroke="#ffffff" stroke-width="32" stroke-linecap="round" />
  </g>
</svg>
